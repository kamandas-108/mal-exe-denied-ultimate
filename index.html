<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mal.exe Denied | AI Threat Hunter</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --primary-glow: #00ffcc;
            --text-main: #c9d1d9;
            --danger: #ff4444;
            --warning: #ffcc00;
            --safe: #00cc66;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #8b949e;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            color: var(--primary-glow);
            display: block;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 5px;
            color: #fff;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: transparent;
            color: var(--primary-glow);
            border: 2px solid var(--primary-glow);
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-glow);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Results Section */
        #results {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #30363d;
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            flex: 1;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .score-box h3 {
            margin: 0 0 10px 0;
            font-size: 1.1em;
            color: #8b949e;
        }

        .score-value {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        .score-label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .explanation-box {
            background-color: #0d1117;
            border-left: 4px solid var(--primary-glow);
            padding: 20px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--primary-glow);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡️ Mal.exe Denied</h1>
        <p class="subtitle">AI-Powered Phishing & Malware Threat Hunter</p>

        <label for="threatInput">Analyze Suspicious Content (URL, Email, Message, Text):</label>
        <textarea id="threatInput" placeholder="Paste the suspicious link, email body, or text message here..."></textarea>
        
        <button id="scanBtn" onclick="scanContent()">Initiate Threat Scan</button>
        
        <div class="loader" id="loader">Analyzing threat vectors... Please wait.</div>

        <div id="results">
            <div class="score-container">
                <div class="score-box" id="phishingBox">
                    <h3>Phishing Risk</h3>
                    <div class="score-value" id="phishingScore">--</div>
                    <div class="score-label" id="phishingLabel">Waiting</div>
                </div>
                <div class="score-box" id="malwareBox">
                    <h3>Malware Risk</h3>
                    <div class="score-value" id="malwareScore">--</div>
                    <div class="score-label" id="malwareLabel">Waiting</div>
                </div>
            </div>
            
            <div class="explanation-box">
                <h3 style="margin-top: 0; color: var(--primary-glow);">Security Analysis</h3>
                <div id="explanationText">Results will appear here.</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 API CONFIGURATION
        // ==========================================
        const OPENROUTER_API_KEY = "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"; 
        
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL_NAME = "nvidia/nemotron-3-super-120b-a12b:free";

        async function scanContent() {
            const input = document.getElementById('threatInput').value.trim();
            if (!input) {
                alert("Please enter some content to analyze.");
                return;
            }

            if (OPENROUTER_API_KEY === "") {
                alert("Please add your OpenRouter API key to the JavaScript code.");
                return;
            }

            // UI Updates: Show loader, hide old results
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            // The Prompt System
            const systemPrompt = `You are an elite cybersecurity threat analyst for a system called 'Mal.exe Denied'. 
            Your job is to analyze the provided text, email, or URL for phishing and malware threats.
            
            You must reply ONLY with a valid JSON object matching this exact structure, with no markdown formatting, no code blocks, and no extra text:
            {
                "phishingScore": <number between 0 and 100>,
                "malwareScore": <number between 0 and 100>,
                "explanation": "<A clear, concise, 2-3 paragraph explanation of the risks, tailored for everyday users. Explain *why* it got these scores.>"
            }`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                        'HTTP-Referer': window.location.href, // Required by OpenRouter
                        'X-Title': 'Mal.exe Denied', // Required by OpenRouter
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Analyze this content:\n\n${input}` }
                        ],
                        temperature: 0.1 // Low temperature for consistent, analytical responses
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                let aiResponse = data.choices[0].message.content;

                // Clean up the response just in case the AI wraps it in markdown (```json ... ```)
                aiResponse = aiResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const resultObj = JSON.parse(aiResponse);
                displayResults(resultObj);

            } catch (error) {
                console.error("Scanning failed:", error);
                alert("An error occurred during the scan. Check the console for details.");
            } finally {
                // UI Updates: Hide loader, enable button
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('loader').style.display = 'none';
            }
        }

        function displayResults(data) {
            const { phishingScore, malwareScore, explanation } = data;

            // Update Phishing Score UI
            const pScoreEl = document.getElementById('phishingScore');
            const pLabelEl = document.getElementById('phishingLabel');
            pScoreEl.innerText = phishingScore;
            applyScoreStyling(phishingScore, document.getElementById('phishingBox'), pScoreEl, pLabelEl);

            // Update Malware Score UI
            const mScoreEl = document.getElementById('malwareScore');
            const mLabelEl = document.getElementById('malwareLabel');
            mScoreEl.innerText = malwareScore;
            applyScoreStyling(malwareScore, document.getElementById('malwareBox'), mScoreEl, mLabelEl);

            // Update Explanation
            document.getElementById('explanationText').innerHTML = explanation.replace(/\n/g, '<br>');

            // Reveal Results
            document.getElementById('results').style.display = 'block';
        }

        function applyScoreStyling(score, box, scoreEl, labelEl) {
            let color, text;
            
            if (score <= 30) {
                color = 'var(--safe)';
                text = 'Safe';
            } else if (score <= 70) {
                color = 'var(--warning)';
                text = 'Suspicious';
            } else {
                color = 'var(--danger)';
                text = 'High Risk';
            }

            scoreEl.style.color = color;
            box.style.borderColor = color;
            labelEl.innerText = text;
            labelEl.style.color = color;
        }
    </script>
</body>
</html>
